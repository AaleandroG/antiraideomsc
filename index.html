<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Ejemplo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f9f9f9, #e3e3e3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #4a90e2;
        }

        label {
            font-weight: 500;
            margin-bottom: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid #ddd;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #4a90e2;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #357ab8;
        }

        .note {
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Formulario de Ejemplo</h1>
        <p class="note">Todos los datos aquí son ficticios y se pueden reemplazar. Esto es solo un ejemplo profesional.</p>

        <form action="<!-- AQUÍ PONES TU ENDPOINT O SERVICIO DE FORMULARIOS -->" method="POST">
            
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Aquí ponéis el nombre completo" required>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

            <label for="tarjeta">Número de tarjeta:</label>
            <input type="text" id="tarjeta" name="tarjeta" placeholder="XXXX XXXX XXXX XXXX" maxlength="19" required>

            <label for="fecha">Fecha de expiración:</label>
            <input type="text" id="fecha" name="fecha" placeholder="MM/AA" maxlength="5" required>

            <label for="cvv">CVV / CVC:</label>
            <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" required>

            <label for="banco">Banco emisor:</label>
            <select id="banco" name="banco">
                <option value="">Selecciona un banco</option>
                <option value="banco1">Banco 1</option>
                <option value="banco2">Banco 2</option>
                <option value="banco3">Banco 3</option>
            </select>

            <p class="note">Recuerda reemplazar la URL de acción con tu servicio de recepción de datos seguro.</p>
            <button type="submit">Enviar datos de ejemplo</button>
        </form>
    </div>
</body>
</html>
